name: Build Binaries

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-14, macos-13, ubuntu-latest, windows-latest]
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pyqt6 PyQt6-Fluent-Widgets
        
    - name: Build with PyInstaller (Mac/Linux)
      if: matrix.os != 'windows-latest'
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "Vibe-Code-This" --icon "images/AppIcon.icns" --add-data "workspace.json:." src/main.py

    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "Vibe-Code-This" --icon "images/AppIcon.ico" --add-data "workspace.json;." src/main.py

    - name: Build DMG (macOS)
      if: matrix.os == 'macos-13' || matrix.os == 'macos-14'
      run: |
        pip install dmgbuild
        dmgbuild -s dmg_settings.py -D app=dist/Vibe-Code-This.app "Vibe-Code-This" "dist/Vibe-Code-This.dmg"
        python3 -c 'import Cocoa; Cocoa.NSWorkspace.sharedWorkspace().setIcon_forFile_options_(Cocoa.NSImage.alloc().initWithContentsOfFile_("images/AppIcon.icns"), "dist/Vibe-Code-This.dmg", 0)'

    - name: Organize output structure
      shell: bash
      run: |
        if [[ "${{ matrix.os }}" == "macos-13" || "${{ matrix.os }}" == "macos-14" ]]; then
          mkdir -p compiles_github/mac
          cp dist/Vibe-Code-This.dmg compiles_github/mac/
        elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          mkdir -p compiles_github/windows
          cp -r dist/* compiles_github/windows/
        else
          mkdir -p compiles_github/linux
          cp -r dist/* compiles_github/linux/
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Vibe-Code-This-${{ matrix.os }}
        path: compiles_github/
